apiVersion: 1

datasources:
  # Автоматически подключаем Prometheus
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true # Делаем его основным источником
    editable: true

  # Автоматически подключаем Loki
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
